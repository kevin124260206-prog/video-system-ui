<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>施柏謙影音系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex flex-col font-sans">

    <header class="border-b border-zinc-800 bg-zinc-900/50 backdrop-blur sticky top-0 z-40 px-4 py-3 flex justify-between items-center">
        <div class="flex items-center space-x-2">
            <span class="text-red-600 text-2xl"><i class="fa-solid fa-play"></i></span>
            <span class="font-bold text-lg tracking-wider">施柏謙影音系統</span>
        </div>
        
        <div id="nav-user-zone" class="hidden flex items-center space-x-4">
            <div class="relative">
                <input id="search-input" type="text" placeholder="搜尋影片..." class="bg-zinc-800 text-sm px-4 py-1.5 rounded-full pl-9 focus:outline-none focus:ring-1 focus:ring-red-600 w-48 sm:w-64 transition-all">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-2.5 text-zinc-500 text-xs"></i>
            </div>
            
            <button id="upload-btn" onclick="openUploadModal()" class="bg-red-600 hover:bg-red-700 px-3 py-1.5 rounded-lg text-xs font-medium transition flex items-center space-x-1">
                <i class="fa-solid fa-cloud-arrow-up"></i>
                <span>上傳影片</span>
            </button>
            <button id="admin-btn" onclick="openAdminModal()" class="hidden bg-zinc-800 hover:bg-zinc-700 px-3 py-1.5 rounded-lg text-xs font-medium transition flex items-center space-x-1">
                <i class="fa-solid fa-shield-halved"></i>
                <span>管理後台</span>
            </button>
            
            <div class="flex items-center space-x-2">
                <span id="user-email-display" class="text-xs text-zinc-400 hidden md:inline"></span>
                <button onclick="handleSignOut()" class="text-xs text-zinc-500 hover:text-zinc-300 transition">登出</button>
            </div>
        </div>
    </header>

    <main class="flex-grow container mx-auto px-4 py-8">
        
        <div id="auth-section" class="max-w-md mx-auto my-12 bg-zinc-900 border border-zinc-800 p-8 rounded-2xl shadow-xl text-center">
            <div class="text-red-600 text-5xl mb-4"><i class="fa-solid fa-film"></i></div>
            <h1 class="text-xl font-bold mb-2">施柏謙影音系統</h1>
            <p class="text-zinc-400 text-xs mb-8">請使用 Google 帳號登入以觀看或管理影片</p>
            
            <div class="flex justify-center mb-4">
                <div id="g_id_onload"
                     data-client_id="212965450673-u44o4joqlh255cmqlpsb0mc7g9pmuhuo.apps.googleusercontent.com"
                     data-callback="handleCredentialResponse"
                     data-auto_prompt="false">
                </div>
                <div class="g_id_signin" data-type="standard" data-size="large" data-theme="dark" data-text="signin_with" data-shape="rectangular" data-logo_alignment="left"></div>
            </div>
            <div id="auth-message" class="text-xs text-yellow-500 mt-4"></div>
        </div>

        <div id="lobby-section" class="hidden">
            <h2 class="text-lg font-semibold mb-6 flex items-center space-x-2">
                <span class="w-1.5 h-5 bg-red-600 rounded-full"></span>
                <span>所有影片</span>
            </h2>
            <div id="video-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                </div>
        </div>
    </main>

    <div id="admin-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-zinc-900 border border-zinc-800 rounded-xl w-full max-w-4xl max-h-[85vh] flex flex-col overflow-hidden shadow-2xl">
            <div class="px-6 py-4 border-b border-zinc-800 flex justify-between items-center bg-zinc-900/50">
                <h3 class="font-bold flex items-center space-x-2">
                    <i class="fa-solid fa-shield-halved text-red-500"></i>
                    <span>管理控制台</span>
                </h3>
                <button onclick="closeAdminModal()" class="text-zinc-500 hover:text-zinc-300 text-xl"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <div class="flex border-b border-zinc-800 bg-zinc-950 px-4">
                <button id="tab-users-btn" onclick="switchAdminTab('users')" class="px-4 py-3 text-xs font-semibold border-b-2 border-red-600 text-red-500">成員管理</button>
                <button id="tab-logs-btn" onclick="switchAdminTab('logs')" class="px-4 py-3 text-xs font-semibold border-b-2 border-transparent text-zinc-400 hover:text-zinc-200">系統紀錄</button>
            </div>
            
            <div id="panel-users" class="p-6 overflow-y-auto flex-grow">
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-xs border-collapse">
                        <thead>
                            <tr class="border-b border-zinc-800 text-zinc-400 font-semibold">
                                <th class="pb-3 w-1/3">Email</th>
                                <th class="pb-3">角色</th>
                                <th class="pb-3">狀態</th>
                                <th class="pb-3 text-right">操作</th>
                            </tr>
                        </thead>
                        <tbody id="users-table-body" class="divide-y divide-zinc-800/50">
                            </tbody>
                    </table>
                </div>
            </div>

            <div id="panel-logs" class="p-6 overflow-y-auto flex-grow hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-xs border-collapse">
                        <thead>
                            <tr class="border-b border-zinc-800 text-zinc-400">
                                <th class="pb-3 w-1/4">時間戳記</th>
                                <th class="pb-3 w-1/6">操作人員</th>
                                <th class="pb-3 w-1/6">動作</th>
                                <th class="pb-3">執行結果</th>
                            </tr>
                        </thead>
                        <tbody id="logs-table-body" class="divide-y divide-zinc-800/50">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="loading-overlay" class="hidden fixed inset-0 bg-black/60 backdrop-blur-[2px] z-50 flex items-center justify-center">
        <div class="text-center">
            <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-b-2 border-red-600 mx-auto mb-3"></div>
            <p class="text-xs text-zinc-400 font-medium">處理中，請稍候...</p>
        </div>
    </div>

    <footer class="text-center py-6 text-zinc-600 text-xs border-t border-zinc-900 mt-12 bg-zinc-950">
        <p>© <span id="copyright-year">2025</span> 施柏謙 版權所有</p>
    </footer>

    <script>
        // ===================== 系統核心設定 =====================
        const CONFIG = {
            // 已更新為您最新的、對接正確試算表 ID 的 GAS 網址
            GAS_API_URL: "https://script.google.com/macros/s/AKfycbzRNexaRQyfDKjVqQKqR2BR7wkyiNDtdsENLSvikThD9taEpMoGnDqAGeh55gJenXUN/exec", 
            SUPER_ADMIN_EMAIL: "a0967022240@gmail.com" // 超級管理員
        };

        let currentUser = {
            email: "",
            role: "一般成員",
            status: ""
        };
        let allVideos = [];

        // 頁面載入初始化
        window.onload = function() {
            // 自動動態生成西元年份 (格式如: 2025-2026)
            const currentYear = new Date().getFullYear();
            document.getElementById('copyright-year').textContent = (currentYear > 2025) ? `2025-${currentYear}` : "2025";
        };

        // 顯示/隱藏讀取中遮罩
        function showLoading(show) {
            const overlay = document.getElementById('loading-overlay');
            if (show) overlay.classList.remove('hidden');
            else overlay.classList.add('hidden');
        }

        // 解析 JWT 以取得登入 Email
        function parseJwt(token) {
            try {
                var base64Url = token.split('.')[1];
                var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                return JSON.parse(jsonPayload);
            } catch (e) {
                return null;
            }
        }

        // Google 登入回傳處理
        async function handleCredentialResponse(response) {
            showLoading(true);
            const payload = parseJwt(response.credential);
            if (!payload || !payload.email) {
                alert("無法解析登入資訊，請重試！");
                showLoading(false);
                return;
            }

            const email = payload.email;
            try {
                // 向後端發送登入驗證
                const url = CONFIG.GAS_API_URL + "?data=" + encodeURIComponent(JSON.stringify({
                    action: "login",
                    userEmail: email
                }));
                const res = await fetch(url);
                const result = await res.json();

                if (result.success) {
                    currentUser.email = email;
                    currentUser.role = result.role;
                    currentUser.status = result.status;

                    // 登入成功，切換大廳介面
                    document.getElementById('auth-section').classList.add('hidden');
                    document.getElementById('lobby-section').classList.remove('hidden');
                    document.getElementById('nav-user-zone').classList.remove('hidden');
                    document.getElementById('user-email-display').textContent = email;

                    // 如果是管理群，顯示後台按鈕
                    if (currentUser.role === "超級管理員" || currentUser.role === "管理員") {
                        document.getElementById('admin-btn').classList.remove('hidden');
                    }

                    // 載入影片大廳
                    await loadVideos();
                } else {
                    // 若未核准或找不到帳號，自動觸發「註冊/申請審核」流程
                    if (confirm(`您的帳號 (${email}) 還不能登入。\n是否要送出加入申請、並等待系統管理員審核？`)) {
                        await registerAccount(email);
                    } else {
                        document.getElementById('auth-message').textContent = result.error;
                    }
                }
            } catch (e) {
                alert("伺服器連線失敗，請檢查 API 網址是否部署正確。");
            } finally {
                showLoading(false);
            }
        }

        // 送出審核申請 (註冊)
        async function registerAccount(email) {
            showLoading(true);
            try {
                const url = CONFIG.GAS_API_URL + "?data=" + encodeURIComponent(JSON.stringify({
                    action: "register",
                    email: email
                }));
                const res = await fetch(url);
                const result = await res.json();
                
                if (result.success) {
                    alert(result.message);
                    document.getElementById('auth-message').textContent = "申請已送出，請靜待管理員核准！";
                } else {
                    alert(result.error);
                }
            } catch (e) {
                alert("連線失敗");
            } finally {
                showLoading(false);
            }
        }

        // 登出
        function handleSignOut() {
            currentUser = { email: "", role: "一般成員", status: "" };
            document.getElementById('auth-section').classList.remove('hidden');
            document.getElementById('lobby-section').classList.add('hidden');
            document.getElementById('nav-user-zone').classList.add('hidden');
            document.getElementById('admin-btn').classList.add('hidden');
            document.getElementById('auth-message').textContent = "";
            google.accounts.id.disableAutoSelect();
        }

        // 載入影片清單
        async function loadVideos() {
            try {
                const url = CONFIG.GAS_API_URL + "?data=" + encodeURIComponent(JSON.stringify({
                    action: "getVideos",
                    userEmail: currentUser.email
                }));
                const res = await fetch(url);
                const result = await res.json();

                if (result.success) {
                    allVideos = result.data;
                    renderVideos(allVideos);
                } else {
                    alert("載入影片失敗: " + result.error);
                }
            } catch (e) {
                console.error(e);
            }
        }

        // 渲染影片卡片
        function renderVideos(videos) {
            const grid = document.getElementById('video-grid');
            grid.innerHTML = "";

            if (videos.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-12 text-center text-zinc-500 text-sm">目前沒有上架的影片</div>`;
                return;
            }

            videos.forEach(video => {
                // 依據後端判定的權限，決定是否產生「垃圾桶」刪除按鈕
                const deleteButton = video.canDelete ? `
                    <button onclick="deleteVideo('${video.id}')" class="absolute top-2 right-2 bg-black/70 hover:bg-red-600/90 text-white hover:text-white p-2 rounded-full transition shadow-lg" title="刪除影片">
                        <i class="fa-solid fa-trash-can text-xs"></i>
                    </button>
                ` : '';

                const card = `
                    <div class="bg-zinc-900 border border-zinc-800 rounded-xl overflow-hidden shadow-md group hover:border-zinc-700 transition relative flex flex-col">
                        <div class="relative aspect-video bg-black overflow-hidden">
                            <img src="${video.thumbnailUrl}" class="w-full h-full object-cover group-hover:scale-105 transition duration-300" alt="${video.title}">
                            ${deleteButton}
                        </div>
                        <div class="p-4 flex-grow flex flex-col justify-between">
                            <div>
                                <h3 class="font-semibold text-sm line-clamp-2 text-zinc-100 group-hover:text-red-500 transition mb-1">${video.title}</h3>
                                <p class="text-[10px] text-zinc-500">上傳者: ${video.uploader}</p>
                            </div>
                            <div class="flex justify-between items-center mt-3 pt-2 border-t border-zinc-800/50">
                                <span class="text-[10px] bg-zinc-800 text-zinc-400 px-2 py-0.5 rounded">${video.category}</span>
                                <span class="text-[10px] text-zinc-500">${video.uploadDate}</span>
                            </div>
                        </div>
                    </div>
                `;
                grid.insertAdjacentHTML('beforeend', card);
            });
        }

        // 刪除影片
        async function deleteVideo(videoId) {
            if (!confirm("您確定要永久刪除並下架這部影片嗎？此操作無法恢復。")) return;
            showLoading(true);
            try {
                const url = CONFIG.GAS_API_URL + "?data=" + encodeURIComponent(JSON.stringify({
                    action: "deleteVideo",
                    userEmail: currentUser.email,
                    videoId: videoId
                }));
                const res = await fetch(url);
                const result = await res.json();
                
                if (result.success) {
                    alert(result.message);
                    await loadVideos();
                } else {
                    alert(result.error);
                }
            } catch (e) {
                alert("操作失敗，網路連線錯誤。");
            } finally {
                showLoading(false);
            }
        }

        // ===================== 後台控制面板相關 =====================

        function openAdminModal() {
            document.getElementById('admin-modal').classList.remove('hidden');
            switchAdminTab('users'); // 預設開啟成員管理
        }

        function closeAdminModal() {
            document.getElementById('admin-modal').classList.add('hidden');
        }

        function switchAdminTab(tab) {
            const usersBtn = document.getElementById('tab-users-btn');
            const logsBtn = document.getElementById('tab-logs-btn');
            const usersPanel = document.getElementById('panel-users');
            const logsPanel = document.getElementById('panel-logs');

            if (tab === 'users') {
                usersBtn.className = "px-4 py-3 text-xs font-semibold border-b-2 border-red-600 text-red-500";
                logsBtn.className = "px-4 py-3 text-xs font-semibold border-b-2 border-transparent text-zinc-400 hover:text-zinc-200";
                usersPanel.classList.remove('hidden');
                logsPanel.classList.add('hidden');
                loadUsersList();
            } else {
                logsBtn.className = "px-4 py-3 text-xs font-semibold border-b-2 border-red-600 text-red-500";
                usersBtn.className = "px-4 py-3 text-xs font-semibold border-b-2 border-transparent text-zinc-400 hover:text-zinc-200";
                logsPanel.classList.remove('hidden');
                usersPanel.classList.add('hidden');
                loadSystemLogs();
            }
        }

        // 載入成員列表並渲染（嚴格限定超級管理員操作權限）
        async function loadUsersList() {
            try {
                const url = CONFIG.GAS_API_URL + "?data=" + encodeURIComponent(JSON.stringify({
                    action: "getUsers",
                    userEmail: currentUser.email
                }));
                const res = await fetch(url);
                const result = await res.json();

                if (result.success) {
                    const tbody = document.getElementById('users-table-body');
                    tbody.innerHTML = "";
                    
                    result.data.forEach(user => {
                        let actionColumn = "";

                        // 核心規則：只有超級管理員（施柏謙本人）的 Email 才能對他人進行升降、審核與刪除帳號
                        if (currentUser.email.toLowerCase() === CONFIG.SUPER_ADMIN_EMAIL.toLowerCase()) {
                            if (user.role === '超級管理員') {
                                actionColumn = `<span class="text-zinc-500">系統保護成員</span>`;
                            } else if (user.status === '待審核') {
                                actionColumn = `
                                    <button onclick="approveUser('${user.email}')" class="bg-green-600 hover:bg-green-700 text-white px-2 py-1 rounded text-[10px] mr-2 transition">核准</button>
                                    <button onclick="rejectUser('${user.email}')" class="bg-red-500 hover:bg-red-600 text-white px-2 py-1 rounded text-[10px] transition">拒絕</button>
                                `;
                            } else if (user.status === '已核准') {
                                const promoteBtnText = user.role === '管理員' ? '降為成員' : '升管理員';
                                const promoteBtnClass = user.role === '管理員' ? 'bg-amber-600 hover:bg-amber-700' : 'bg-blue-600 hover:bg-blue-700';
                                
                                actionColumn = `
                                    <button onclick="promoteUser('${user.email}')" class="text-white px-2 py-1 rounded text-[10px] mr-2 transition ${promoteBtnClass}">${promoteBtnText}</button>
                                    <button onclick="deleteUser('${user.email}')" class="bg-red-600 hover:bg-red-700 text-white px-2 py-1 rounded text-[10px] transition">刪除帳號</button>
                                `;
                            }
                        } else {
                            // 其他普通管理員進來時，只能「看」名單，操作欄位上鎖
                            actionColumn = `<span class="text-zinc-500 italic">僅超級管理員可操作</span>`;
                        }

                        const row = `
                            <tr class="hover:bg-zinc-900/50 transition">
                                <td class="py-3 font-medium">${user.email}</td>
                                <td class="py-3 text-zinc-400">${user.role}</td>
                                <td class="py-3">
                                    <span class="px-2 py-0.5 rounded-full text-[10px] ${user.status === '已核准' ? 'bg-green-950 text-green-400 border border-green-900' : 'bg-yellow-950 text-yellow-400 border border-yellow-900'}">
                                        ${user.status}
                                    </span>
                                </td>
                                <td class="py-3 text-right">${actionColumn}</td>
                            </tr>
                        `;
                        tbody.insertAdjacentHTML('beforeend', row);
                    });
                }
            } catch (e) {
                console.error("載入成員出錯", e);
            }
        }

        // 成員核准
        async function approveUser(targetEmail) {
            showLoading(true);
            try {
                const url = CONFIG.GAS_API_URL + "?data=" + encodeURIComponent(JSON.stringify({
                    action: "approveUser",
                    userEmail: currentUser.email,
                    targetEmail: targetEmail
                }));
                const res = await fetch(url);
                const result = await res.json();
                if (result.success) {
                    alert(result.message);
                    loadUsersList();
                } else alert(result.error);
            } catch (e) { alert("操作出錯"); } finally { showLoading(false); }
        }

        // 成員拒絕
        async function rejectUser(targetEmail) {
            if (!confirm(`確定要拒絕 ${targetEmail} 的加入申請嗎？`)) return;
            showLoading(true);
            try {
                const url = CONFIG.GAS_API_URL + "?data=" + encodeURIComponent(JSON.stringify({
                    action: "rejectUser",
                    userEmail: currentUser.email,
                    targetEmail: targetEmail
                }));
                const res = await fetch(url);
                const result = await res.json();
                if (result.success) {
                    alert(result.message);
                    loadUsersList();
                } else alert(result.error);
            } catch (e) { alert("操作出錯"); } finally { showLoading(false); }
        }

        // 成員升降級
        async function promoteUser(targetEmail) {
            if (!confirm(`確定要變更 ${targetEmail} 的管理權限嗎？`)) return;
            showLoading(true);
            try {
                const url = CONFIG.GAS_API_URL + "?data=" + encodeURIComponent(JSON.stringify({
                    action: "promoteUser",
                    userEmail: currentUser.email,
                    targetEmail: targetEmail
                }));
                const res = await fetch(url);
                const result = await res.json();
                if (result.success) {
                    alert(result.message);
                    loadUsersList();
                } else alert(result.error);
            } catch (e) { alert("操作出錯"); } finally { showLoading(false); }
        }

        // 刪除成員帳號
        async function deleteUser(targetEmail) {
            if (!confirm(`警告！您確定要永久註銷 ${targetEmail} 的帳號嗎？此動作將清除其在資料庫的紀錄且不可復原！`)) return;
            showLoading(true);
            try {
                const url = CONFIG.GAS_API_URL + "?data=" + encodeURIComponent(JSON.stringify({
                    action: "deleteUser",
                    userEmail: currentUser.email,
                    targetEmail: targetEmail
                }));
                const res = await fetch(url);
                const result = await res.json();
                if (result.success) {
                    alert(result.message);
                    loadUsersList();
                } else alert(result.error);
            } catch (e) { alert("操作出錯"); } finally { showLoading(false); }
        }

        // 載入系統紀錄
        async function loadSystemLogs() {
            try {
                const url = CONFIG.GAS_API_URL + "?data=" + encodeURIComponent(JSON.stringify({
                    action: "getUsers", // 共用大專案連線
                    userEmail: currentUser.email
                }));
                // 注意：這部分可以與您現有讀取「系統紀錄」的 API 介面做整合
                const tbody = document.getElementById('logs-table-body');
                tbody.innerHTML = `<tr><td colspan="4" class="py-4 text-center text-zinc-500">系統紀錄讀取中...</td></tr>`;
                
                // 本地渲染或直接對接系統紀錄工作表 (Sheet 4)
            } catch (e) {
                console.error("讀取紀錄失敗");
            }
        }

        // 開啟上傳視窗等其餘附屬前端彈窗（可依您的介面客製化）
        function openUploadModal() {
