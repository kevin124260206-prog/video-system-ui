<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>影音系統</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        /* YouTube 風格 UI 樣式 */
        :root { --bg: #0f0f0f; --text: #f1f1f1; --accent: #cc0000; --card: #272727; }
        body { font-family: 'Roboto', 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; }
        header { background: #000; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        header h2 { margin: 0; font-size: 20px; font-weight: 500; }
        .user-profile { font-size: 14px; color: #aaa; }
        
        main { padding: 30px; flex: 1; max-width: 1600px; margin: 0 auto; width: 100%; box-sizing: border-box; }
        .hidden { display: none !important; }
        
        /* 驗證區域 - 管理員後台 */
        .admin-zone { background: #1f1f1f; border: 1px solid #333; border-radius: 8px; padding: 20px; margin-bottom: 30px; }
        .admin-zone h3 { color: var(--accent); margin-top: 0; }
        .admin-controls { display: flex; gap: 20px; flex-wrap: wrap; }
        .control-group { background: var(--card); padding: 15px; border-radius: 8px; flex: 1; min-width: 300px; }
        input[type="text"] { width: calc(100% - 20px); padding: 10px; margin-bottom: 10px; background: #121212; border: 1px solid #444; color: white; border-radius: 4px; }
        button { background: var(--accent); color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #ff0000; }

        /* YouTube 影片網格與縮圖 */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        .video-card { cursor: pointer; transition: transform 0.2s; }
        .video-card:hover { transform: scale(1.02); }
        .thumbnail-container { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; position: relative; }
        .thumbnail-container img { width: 100%; height: 100%; object-fit: cover; }
        .video-info { padding: 10px 0; }
        .video-title { font-size: 16px; font-weight: 500; margin: 0 0 5px 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .video-meta { font-size: 13px; color: #aaa; margin: 2px 0; }
        
        /* 狀態標籤 */
        .badge { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 12px; margin-bottom: 5px; }
        .badge.pending { background: #d97706; }
        .badge.approved { background: #16a34a; }
        .badge.rejected { background: #dc2626; }

        /* 影片播放器 Modal */
        #player-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        video { width: 80%; max-width: 1000px; aspect-ratio: 16/9; background: #000; border: 1px solid #333; outline: none; }
        .close-btn { position: absolute; top: 20px; right: 30px; font-size: 30px; color: white; cursor: pointer; }

        footer { text-align: center; padding: 20px; color: #666; font-size: 12px; border-top: 1px solid #333; }
    </style>
</head>
<body>

    <header>
        <h2>影音系統</h2>
        <div id="login-btn">
            <div id="g_id_onload" data-client_id="212965450673-u44o4joqlh255cmqlpsb0mc7g9pmuhuo.apps.googleusercontent.com" data-callback="handleCredentialResponse" data-auto_prompt="false"></div>
            <div class="g_id_signin" data-type="standard" data-theme="filled_black"></div>
        </div>
        <div id="user-info" class="user-profile hidden"></div>
    </header>

    <main>
        <div id="admin-zone" class="admin-zone hidden">
            <h3>系統管理員後台</h3>
            <div class="admin-controls">
                <div class="control-group">
                    <h4>綁定新儲存空間 (Drive ID)</h4>
                    <input type="text" id="new-folder-id" placeholder="貼上 Google Drive 資料夾 ID">
                    <button onclick="addStorage()">新增並啟用監控</button>
                </div>
                <div class="control-group">
                    <h4>帳號快速審核</h4>
                    <input type="text" id="target-email" placeholder="輸入會員 Email">
                    <select id="target-role" style="padding:10px; margin-right:5px;"><option value="一般成員">一般成員</option><option value="管理員">管理員</option></select>
                    <select id="target-status" style="padding:10px; margin-right:5px;"><option value="已核准">核准</option><option value="封鎖">封鎖</option></select>
                    <button onclick="updateUser()">執行修改</button>
                </div>
            </div>
        </div>

        <div id="video-section" class="hidden">
            <div class="video-grid" id="video-grid">
                </div>
        </div>
    </main>

    <div id="player-modal" class="hidden">
        <div class="close-btn" onclick="closePlayer()">&times;</div>
        <video id="html5-player" controls preload="auto" controlsList="nodownload">
            您的瀏覽器不支援 HTML5 影片播放。
        </video>
    </div>

    <footer>
        &copy; 2025-<span id="current-year"></span> 施柏謙 版權所有 
    </footer>

    <script>
        document.getElementById('current-year').innerText = new Date().getFullYear();
        
        // 最終完整版 GAS URL
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwg1WnhnPPc5KBfZKCD4FSxuewO2szmLVBTidMh8Ai4dHaz9M_jTBphZkjbwx4pf9zi/exec";
        let currentUser = { email: "", role: "" };

        function parseJwt(token) {
            const base64Url = token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            return JSON.parse(decodeURIComponent(atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')));
        }

        // 登入驗證
        async function handleCredentialResponse(response) {
            const payload = parseJwt(response.credential);
            
            try {
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: 'data=' + encodeURIComponent(JSON.stringify({ action: "login", userEmail: payload.email }))
                });
                const data = await res.json();
                
                if (data.success) {
                    currentUser = { email: payload.email, role: data.role };
                    document.getElementById('login-btn').classList.add('hidden');
                    document.getElementById('user-info').classList.remove('hidden');
                    document.getElementById('user-info').innerText = `${currentUser.email} (${currentUser.role})`;
                    document.getElementById('video-section').classList.remove('hidden');
                    
                    // 根據權限渲染 Admin Zone (超級管理員與管理員)
                    if (currentUser.role === "管理員" || currentUser.role === "超級管理員") {
                        document.getElementById('admin-zone').classList.remove('hidden');
                    }
                    loadSystemData();
                } else {
                    alert("登入失敗：" + data.error);
                }
            } catch(e) { 
                console.error("連線錯誤詳情:", e);
                alert("系統連線異常，詳細錯誤已記錄在瀏覽器 Console 中 (請按 F12 檢查)。"); 
            }
        }

        // 載入與渲染 YouTube 風格網格
        async function loadSystemData() {
            document.getElementById('video-grid').innerHTML = "<p>載入影片中...</p>";
            try {
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: 'data=' + encodeURIComponent(JSON.stringify({ action: "getSystemData", userEmail: currentUser.email }))
                });
                const result = await res.json();
                
                if (result.success) {
                    const grid = document.getElementById('video-grid');
                    grid.innerHTML = "";
                    if (!result.data.videos || result.data.videos.length === 0) {
                        grid.innerHTML = "<p>目前還沒有可觀看的影片哦！</p>";
                        return;
                    }

                    result.data.videos.forEach(v => {
                        let badgeColor = v.status === '已核准' ? 'approved' : (v.status === '待審核' ? 'pending' : 'rejected');
                        let adminHtml = (currentUser.role === "管理員" || currentUser.role === "超級管理員") && v.status === "待審核" ? 
                            `<div style="margin-top:10px;"><button onclick="reviewVideo('${v.id}', '已核准', '${v.uploader}', event)" style="background:#16a34a; padding:5px 10px;">核准</button> 
                             <button onclick="reviewVideo('${v.id}', '已拒絕', '${v.uploader}', event)" style="background:#dc2626; padding:5px 10px;">拒絕</button></div>` : "";

                        grid.innerHTML += `
                            <div class="video-card" onclick="openPlayer('${v.id}')">
                                <div class="thumbnail-container">
                                    <img src="${v.thumbnail}" alt="Thumbnail" onerror="this.src='https://via.placeholder.com/800x450/222/555?text=Video'">
                                </div>
                                <div class="video-info">
                                    <span class="badge ${badgeColor}">${v.status}</span>
                                    <h4 class="video-title">${v.title}</h4>
                                    <div class="video-meta">${v.uploader} • 標籤: ${v.tags}</div>
                                    ${adminHtml}
                                </div>
                            </div>`;
                    });
                } else {
                    document.getElementById('video-grid').innerHTML = `<p>載入失敗: ${result.error}</p>`;
                }
            } catch(e) {
                console.error("載入資料錯誤:", e);
                document.getElementById('video-grid').innerHTML = "<p>無法取得資料，請檢查後端連線。</p>";
            }
        }

        // 單筆審核觸發
        async function reviewVideo(videoId, status, uploaderEmail, event) {
            event.stopPropagation();
            if(!confirm(`確定將影片設為 ${status} 嗎？系統將自動發送 Email 通知上傳者。`)) return;
            
            try {
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: 'data=' + encodeURIComponent(JSON.stringify({ action: "reviewVideo", userEmail: currentUser.email, videoId, status, uploaderEmail }))
                });
                const result = await res.json();
                alert(result.success ? "審核完成！已發信通知。" : result.error);
                loadSystemData(); 
            } catch(e) { alert("發生錯誤，請稍後再試。"); }
        }

        // 新增儲存空間
        async function addStorage() {
            const folderId = document.getElementById('new-folder-id').value;
            if(!folderId) return alert("請輸入 ID");
            try {
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: 'data=' + encodeURIComponent(JSON.stringify({ action: "updateStorage", userEmail: currentUser.email, folderId }))
                });
                const result = await res.json();
                alert(result.success ? result.message : result.error);
                document.getElementById('new-folder-id').value = '';
            } catch(e) { alert("發生錯誤。"); }
        }

        // 帳號管理
        async function updateUser() {
            const targetEmail = document.getElementById('target-email').value;
            const newRole = document.getElementById('target-role').value;
            const newStatus = document.getElementById('target-status').value;
            try {
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: 'data=' + encodeURIComponent(JSON.stringify({ action: "manageUser", userEmail: currentUser.email, targetEmail, newRole, newStatus }))
                });
                const result = await res.json();
                alert(result.success ? result.message : result.error);
            } catch(e) { alert("發生錯誤。"); }
        }

        // 播放影片
        async function openPlayer(videoId) {
            const playerModal = document.getElementById('player-modal');
            const videoElement = document.getElementById('html5-player');
            
            try {
                const res = await fetch(`${GAS_URL}?action=stream&videoId=${videoId}&email=${currentUser.email}`);
                const data = await res.json();
                
                if(data.url) {
                    playerModal.classList.remove('hidden');
                    videoElement.src = data.url;
                    videoElement.play();
                } else {
                    alert("無法播放：可能是權限不足或檔案格式錯誤。");
                }
            } catch(e) { alert("播放請求失敗。"); }
        }

        function closePlayer() {
            const playerModal = document.getElementById('player-modal');
            const videoElement = document.getElementById('html5-player');
            playerModal.classList.add('hidden');
            videoElement.pause();
            videoElement.src = "";
        }
    </script>
</body>
</html>
