<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>施柏謙影音系統</title>
    
    <!-- Google OAuth -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ========== 完整 CSS（與之前相同，此處精簡保留關鍵部分） ========== */
        :root {
            --bg-primary: #0f0f0f;
            --bg-secondary: #1a1a1a;
            --bg-tertiary: #272727;
            --bg-hover: #3a3a3a;
            --text-primary: #f1f1f1;
            --text-secondary: #aaaaaa;
            --text-tertiary: #717171;
            --accent: #ff4444;
            --accent-hover: #cc0000;
            --blue: #3ea6ff;
            --green: #2ba640;
            --border: #303030;
            --shadow: 0 2px 10px rgba(0,0,0,0.5);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 18px;
            --transition: all 0.2s ease;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Roboto','Segoe UI','Noto Sans TC',Arial,sans-serif;
            background: var(--bg-primary); color: var(--text-primary);
            min-height: 100vh; display: flex; flex-direction: column;
        }
        .navbar {
            background: var(--bg-secondary); border-bottom: 1px solid var(--border);
            padding: 0 24px; height: 56px; display: flex; align-items: center;
            justify-content: space-between; position: sticky; top: 0; z-index: 1000;
        }
        .navbar-brand { display: flex; align-items: center; gap: 12px; font-size: 1.2rem; font-weight: 700; cursor: pointer; }
        .navbar-brand i { color: var(--accent); font-size: 1.5rem; }
        .navbar-search { flex: 1; max-width: 600px; margin: 0 40px; position: relative; }
        .navbar-search input { width: 100%; padding: 10px 50px 10px 20px; border-radius: 24px; border: 1px solid var(--border); background: var(--bg-primary); color: var(--text-primary); font-size: 0.95rem; outline: none; }
        .navbar-search input:focus { border-color: var(--blue); }
        .navbar-search button { position: absolute; right: 4px; top: 4px; background: var(--bg-tertiary); border: none; color: var(--text-primary); padding: 6px 16px; border-radius: 20px; cursor: pointer; }
        .navbar-user { display: flex; align-items: center; gap: 16px; }
        .user-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; }
        .admin-btn { background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border); padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 0.85rem; display: none; }
        .admin-btn.visible { display: inline-flex; align-items: center; gap: 6px; }
        .logout-btn { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 0.85rem; }
        .main-content { flex: 1; max-width: 1400px; margin: 0 auto; padding: 24px; width: 100%; }
        .login-page { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 70vh; }
        .login-card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 48px 40px; max-width: 420px; width: 100%; text-align: center; }
        .login-card .logo-icon { font-size: 4rem; color: var(--accent); margin-bottom: 16px; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .video-card { cursor: pointer; transition: var(--transition); border-radius: var(--radius-md); overflow: hidden; background: var(--bg-secondary); }
        .video-card:hover { transform: translateY(-4px); box-shadow: var(--shadow); }
        .thumbnail-container { position: relative; width: 100%; padding-top: 56.25%; background: var(--bg-tertiary); overflow: hidden; }
        .thumbnail-container img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .thumbnail-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; opacity: 0; transition: var(--transition); }
        .video-card:hover .thumbnail-overlay { opacity: 1; }
        .play-icon-circle { width: 56px; height: 56px; border-radius: 50%; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
        .duration-badge { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.8); color: white; padding: 3px 8px; border-radius: 4px; font-size: 0.75rem; }
        .video-info { padding: 12px 14px; display: flex; gap: 10px; }
        .uploader-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--accent); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: bold; color: white; }
        .video-details { flex: 1; min-width: 0; }
        .video-title { font-weight: 600; font-size: 0.95rem; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .video-meta { font-size: 0.8rem; color: var(--text-secondary); }
        .player-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; display: none; flex-direction: column; }
        .player-overlay.active { display: flex; }
        .player-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; }
        .close-player { background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; }
        .player-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .player-container video { max-width: 100%; max-height: 70vh; border-radius: var(--radius-sm); }
        .admin-panel-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 3000; display: none; align-items: center; justify-content: center; }
        .admin-panel-overlay.active { display: flex; }
        .admin-panel { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius-md); width: 90%; max-width: 900px; max-height: 85vh; overflow-y: auto; padding: 32px; }
        .admin-tabs { display: flex; gap: 4px; margin-bottom: 24px; border-bottom: 1px solid var(--border); }
        .admin-tab { padding: 10px 20px; cursor: pointer; color: var(--text-secondary); border-bottom: 2px solid transparent; }
        .admin-tab.active { color: var(--text-primary); border-bottom-color: var(--accent); }
        .admin-tab-content { display: none; }
        .admin-tab-content.active { display: block; }
        .btn { padding: 8px 16px; border: none; border-radius: 20px; cursor: pointer; font-size: 0.85rem; font-weight: 500; }
        .btn-approve { background: var(--green); color: white; }
        .btn-reject { background: var(--accent); color: white; }
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; }
        .status-approved { background: #1b5e20; color: #81c784; }
        .status-pending { background: #e65100; color: #ffab40; }
        .status-rejected { background: #b71c1c; color: #ef9a9a; }
        .hidden { display: none !important; }
        .loading-spinner { display: flex; flex-direction: column; align-items: center; padding: 60px; color: var(--text-secondary); }
        .spinner { width: 48px; height: 48px; border: 4px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast { position: fixed; bottom: 20px; right: 20px; padding: 12px 24px; border-radius: 8px; color: white; font-weight: 500; z-index: 9999; animation: slideIn 0.3s ease; }
        .toast-success { background: #2e7d32; }
        .toast-error { background: #c62828; }
        .toast-warning { background: #ef6c00; }
        .toast-info { background: #1565c0; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>

    <!-- 導覽列 -->
    <nav class="navbar">
        <div class="navbar-brand" onclick="goHome()"><i class="fa-solid fa-play"></i><span>施柏謙影音</span></div>
        <div class="navbar-search" id="search-container">
            <input type="text" id="search-input" placeholder="搜尋影片..." onkeyup="handleSearch(this.value)">
            <button onclick="handleSearch(document.getElementById('search-input').value)"><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>
        <div class="navbar-user">
            <button class="admin-btn" id="admin-btn" onclick="openAdminPanel()"><i class="fa-solid fa-gear"></i> 管理後台</button>
            <span id="user-display-name" style="color: var(--text-secondary); font-size: 0.85rem;"></span>
            <div class="user-avatar" id="user-avatar-initial">?</div>
            <button class="logout-btn" onclick="handleLogout()"><i class="fa-solid fa-right-from-bracket"></i> 登出</button>
        </div>
    </nav>

    <!-- 主內容 -->
    <div class="main-content" id="main-content">
        <!-- 登入頁 -->
        <div class="login-page" id="login-page">
            <div class="login-card">
                <div class="logo-icon"><i class="fa-solid fa-film"></i></div>
                <h2>施柏謙影音系統</h2>
                <p>請使用 Google 帳號登入以觀看影片</p>
                <div id="g_id_onload"
                     data-client_id="212965450673-u44o4joqlh255cmqlpsb0mc7g9pmuhuo.apps.googleusercontent.com"
                     data-callback="handleGoogleLogin"
                     data-auto_prompt="false">
                </div>
                <div class="g_id_signin" data-type="standard" data-size="large" data-theme="filled_black" data-text="sign_in_with" data-shape="rectangular" data-logo_alignment="left"></div>
                <div id="login-status" class="hidden" style="margin-top:20px;">
                    <div class="loading-spinner"><div class="spinner"></div><p>正在驗證您的權限...</p></div>
                </div>
            </div>
        </div>
        
        <!-- 影片庫 -->
        <div class="hidden" id="videos-page">
            <div class="section-title"><i class="fa-solid fa-house"></i> 全部影片</div>
            <div class="video-grid" id="video-grid"></div>
            <div id="videos-loading" class="loading-spinner hidden"><div class="spinner"></div><p>載入影片中...</p></div>
            <div id="videos-empty" class="hidden" style="text-align:center;padding:60px;color:var(--text-secondary);">
                <i class="fa-solid fa-video-slash" style="font-size:3rem;margin-bottom:16px;"></i>
                <p>目前沒有可觀看的影片</p>
            </div>
        </div>
    </div>

    <!-- 播放器 -->
    <div class="player-overlay" id="player-overlay">
        <div class="player-header">
            <span class="video-title-display" id="player-video-title">影片標題</span>
            <button class="close-player" onclick="closePlayer()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="player-container">
            <video id="video-player" controls controlsList="nodownload" ontimeupdate="updateProgress()" onloadedmetadata="updateDuration()"></video>
        </div>
    </div>

    <!-- 管理後台 -->
    <div class="admin-panel-overlay" id="admin-overlay">
        <div class="admin-panel">
            <button class="close-player" style="float:right;" onclick="closeAdminPanel()"><i class="fa-solid fa-xmark"></i></button>
            <h3><i class="fa-solid fa-shield-halved"></i> 管理控制台</h3>
            <div class="admin-tabs">
                <div class="admin-tab active" data-tab="tab-users" onclick="switchAdminTab('tab-users')">成員管理</div>
                <div class="admin-tab" data-tab="tab-pending" onclick="switchAdminTab('tab-pending')">待審核</div>
                <div class="admin-tab" data-tab="tab-storage" onclick="switchAdminTab('tab-storage')">儲存空間</div>
                <div class="admin-tab" data-tab="tab-logs" onclick="switchAdminTab('tab-logs')">系統紀錄</div>
            </div>
            <div class="admin-tab-content active" id="tab-users">
                <h4>所有成員</h4>
                <table class="admin-table"><thead><tr><th>Email</th><th>顯示名稱</th><th>角色</th><th>狀態</th><th>操作</th></tr></thead><tbody id="users-table-body"></tbody></table>
            </div>
            <div class="admin-tab-content" id="tab-pending">
                <h4>待審核申請</h4><div id="pending-list"></div>
            </div>
            <div class="admin-tab-content" id="tab-storage">
                <h4>儲存空間狀態</h4><div id="storage-info"></div>
                <h5>新增儲存區 (僅超級管理員)</h5>
                <input type="text" class="input-field" id="new-folder-id" placeholder="Google Drive 資料夾 ID">
                <input type="text" class="input-field" id="new-folder-name" placeholder="資料夾名稱">
                <button class="btn btn-approve" onclick="addStorageFolder()">新增</button>
            </div>
            <div class="admin-tab-content" id="tab-logs">
                <h4>最近系統紀錄</h4>
                <table class="admin-table"><thead><tr><th>時間</th><th>動作</th><th>使用者</th><th>詳細</th></tr></thead><tbody id="logs-table-body"></tbody></table>
            </div>
        </div>
    </div>

    <script>
        // ===================== 設定 =====================
        const CONFIG = {
            GAS_API_URL: "https://script.google.com/macros/s/AKfycbyqggI8dFazGr3ubpZV2s_LeyafVQ-W9WOmHBR6OiFaDdhfhumSNYP9f5JXHjkzfqec/exec",  // 請換成你自己的 GAS 網址
            CLIENT_ID: "212965450673-u44o4joqlh255cmqlpsb0mc7g9pmuhuo.apps.googleusercontent.com"       // 請換成你自己的 OAuth Client ID
        };

        // ===================== 全域狀態 =====================
        const state = {
            userEmail: "", displayName: "", role: "", status: "",
            videos: [], currentVideo: null
        };

        // ===================== 工具函式 =====================
        function showToast(msg, type='info') {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        async function callAPI(action, params={}) {
            const data = { action, ...params };
            const url = CONFIG.GAS_API_URL + "?data=" + encodeURIComponent(JSON.stringify(data));
            const res = await fetch(url);
            return await res.json();
        }

        function parseJwt(token) {
            const base64Url = token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const jsonPayload = decodeURIComponent(atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
            return JSON.parse(jsonPayload);
        }

        // ===================== 登入 =====================
        function handleGoogleLogin(response) {
            const payload = parseJwt(response.credential);
            state.userEmail = payload.email;
            state.displayName = payload.name || payload.email;
            document.getElementById('login-status').classList.remove('hidden');
            document.querySelector('.g_id_signin').style.display = 'none';
            
            callAPI('login', { userEmail: state.userEmail }).then(result => {
                if (result.success) {
                    state.role = result.role;
                    state.status = result.status || '已核准';
                    updateUIForUser();
                    loadVideos();
                    document.getElementById('login-page').classList.add('hidden');
                    document.getElementById('videos-page').classList.remove('hidden');
                } else {
                    handleLoginError(result);
                }
            }).catch(() => {
                showToast('連線錯誤','error');
                resetLoginUI();
            });
        }

        function handleLoginError(result) {
            callAPI('checkAuth', { userEmail: state.userEmail }).then(auth => {
                if (auth.exists && auth.status === '待審核') {
                    showToast('帳號審核中，請等待管理員核准','warning');
                } else if (!auth.exists) {
                    callAPI('register', { email: state.userEmail, displayName: state.displayName }).then(reg => {
                        showToast(reg.message || '已送出註冊申請','info');
                    });
                } else {
                    showToast(result.error || '登入失敗','error');
                }
                resetLoginUI();
            });
        }

        function resetLoginUI() {
            document.getElementById('login-status').classList.add('hidden');
            document.querySelector('.g_id_signin').style.display = 'block';
        }

        function updateUIForUser() {
            document.getElementById('user-display-name').textContent = state.displayName;
            document.getElementById('user-avatar-initial').textContent = state.displayName.charAt(0).toUpperCase();
            if (state.role === '超級管理員' || state.role === '管理員') {
                document.getElementById('admin-btn').classList.add('visible');
            }
        }

        // ===================== 影片 =====================
        async function loadVideos() {
            document.getElementById('videos-loading').classList.remove('hidden');
            try {
                const res = await callAPI('getVideos', { userEmail: state.userEmail });
                if (res.success) {
                    state.videos = res.data;
                    renderVideoGrid(state.videos);
                } else {
                    showToast(res.error, 'error');
                }
            } catch (e) {
                showToast('讀取影片失敗','error');
            } finally {
                document.getElementById('videos-loading').classList.add('hidden');
            }
        }

        function renderVideoGrid(videos) {
            const grid = document.getElementById('video-grid');
            const empty = document.getElementById('videos-empty');
            if (!videos.length) {
                grid.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }
            empty.classList.add('hidden');
            grid.innerHTML = videos.map(v => `
                <div class="video-card" onclick="openVideo('${v.id}')">
                    <div class="thumbnail-container">
                        <img src="${v.thumbnailUrl || ''}" alt="${v.title}" onerror="this.parentElement.style.background='#333'">
                        <div class="thumbnail-overlay">
                            <div class="play-icon-circle"><i class="fa-solid fa-play"></i></div>
                        </div>
                        <span class="duration-badge">${v.duration || '--:--'}</span>
                    </div>
                    <div class="video-info">
                        <div class="uploader-avatar">${(v.uploader||'?').charAt(0)}</div>
                        <div class="video-details">
                            <div class="video-title">${v.title}</div>
                            <div class="video-meta">
                                <span>${v.uploader || '未知'}</span>
                                <span>${v.views || 0} 次觀看 · ${v.uploadDate || ''}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function handleSearch(keyword) {
            const kw = keyword.toLowerCase();
            const filtered = state.videos.filter(v => 
                (v.title||'').toLowerCase().includes(kw) || 
                (v.description||'').toLowerCase().includes(kw)
            );
            renderVideoGrid(filtered);
        }

        // ===================== 播放器與加密串流 =====================
        async function openVideo(videoId) {
            try {
                // 先取得加密 token
                const tokenRes = await callAPI('getStreamToken', { videoId, userEmail: state.userEmail });
                if (!tokenRes.success) {
                    showToast(tokenRes.error, 'error');
                    return;
                }
                const streamUrl = tokenRes.streamUrl;
                const player = document.getElementById('video-player');
                player.src = streamUrl;
                document.getElementById('player-video-title').textContent = 
                    state.videos.find(v => v.id === videoId)?.title || '影片';
                document.getElementById('player-overlay').classList.add('active');
                player.play();
            } catch (e) {
                showToast('無法載入影片', 'error');
            }
        }

        function closePlayer() {
            const player = document.getElementById('video-player');
            player.pause();
            player.src = '';
            document.getElementById('player-overlay').classList.remove('active');
        }

        function updateProgress() {
            const player = document.getElementById('video-player');
            const pct = (player.currentTime / player.duration) * 100;
            document.getElementById('progress-fill').style.width = pct + '%';
            document.getElementById('current-time').textContent = formatTime(player.currentTime);
        }
        function updateDuration() {
            const player = document.getElementById('video-player');
            document.getElementById('total-time').textContent = formatTime(player.duration);
        }
        function formatTime(sec) {
            const m = Math.floor(sec / 60);
            const s = Math.floor(sec % 60);
            return m + ':' + (s < 10 ? '0' : '') + s;
        }
        function togglePlay() {
            const player = document.getElementById('video-player');
            player.paused ? player.play() : player.pause();
        }
        function seekVideo(e) {
            const bar = e.currentTarget;
            const pct = e.offsetX / bar.offsetWidth;
            document.getElementById('video-player').currentTime = pct * document.getElementById('video-player').duration;
        }
        function toggleFullscreen() {
            const player = document.getElementById('video-player');
            if (player.requestFullscreen) player.requestFullscreen();
        }

        // ===================== 管理後台 =====================
        function openAdminPanel() {
            document.getElementById('admin-overlay').classList.add('active');
            loadAdminData('tab-users');
        }
        function closeAdminPanel() {
            document.getElementById('admin-overlay').classList.remove('active');
        }
        function switchAdminTab(tabId) {
            document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`[data-tab="${tabId}"]`).classList.add('active');
            document.querySelectorAll('.admin-tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            loadAdminData(tabId);
        }
        async function loadAdminData(tabId) {
            if (tabId === 'tab-users') {
                const res = await callAPI('getUsers', { userEmail: state.userEmail });
                if (res.success) {
                    const tbody = document.getElementById('users-table-body');
                    tbody.innerHTML = res.data.map(u => `
                        <tr>
                            <td>${u.email}</td><td>${u.displayName}</td>
                            <td>${u.role}</td>
                            <td><span class="status-badge ${u.status==='已核准'?'status-approved':u.status==='待審核'?'status-pending':'status-rejected'}">${u.status}</span></td>
                            <td>
                                ${u.role !== '超級管理員' ? `
                                <button class="btn btn-approve" onclick="approveUser('${u.email}')">核准</button>
                                <button class="btn btn-reject" onclick="rejectUser('${u.email}')">拒絕</button>
                                ` : '受保護'}
                            </td>
                        </tr>
                    `).join('');
                }
            } else if (tabId === 'tab-pending') {
                const res = await callAPI('getPendingReviews', { userEmail: state.userEmail });
                if (res.success) {
                    const div = document.getElementById('pending-list');
                    div.innerHTML = res.data.length ? res.data.map(u => `
                        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);">
                            <span>${u.displayName} (${u.email})</span>
                            <div>
                                <button class="btn btn-approve" onclick="approveUser('${u.email}')">核准</button>
                                <button class="btn btn-reject" onclick="rejectUser('${u.email}')">拒絕</button>
                            </div>
                        </div>
                    `).join('') : '<p>暫無待審核申請</p>';
                }
            } else if (tabId === 'tab-storage') {
                const res = await callAPI('getStorageInfo', { userEmail: state.userEmail });
                if (res.success) {
                    document.getElementById('storage-info').innerHTML = res.data.map(s => `
                        <div style="margin-bottom:10px;">
                            <strong>${s.folderName}</strong> (${s.currentSizeGB} GB / ${s.limitGB} GB) 
                            <span style="color:${s.isActive?'#4caf50':'#888'}">${s.isActive ? '● 啟用中' : '○ 未啟用'}</span>
                            ${s.isFull ? '<span style="color:#f44336;"> [已滿]</span>' : ''}
                        </div>
                    `).join('');
                }
            } else if (tabId === 'tab-logs') {
                const res = await callAPI('getSystemLogs', { userEmail: state.userEmail });
                if (res.success) {
                    document.getElementById('logs-table-body').innerHTML = res.data.map(l => `
                        <tr><td>${l.timestamp}</td><td>${l.action}</td><td>${l.user}</td><td>${l.detail}</td></tr>
                    `).join('');
                }
            }
        }

        async function approveUser(email) {
            const res = await callAPI('approveUser', { userEmail: state.userEmail, targetEmail: email });
            showToast(res.message, res.success ? 'success' : 'error');
            if (res.success) switchAdminTab('tab-pending');
        }
        async function rejectUser(email) {
            const reason = prompt('請輸入拒絕原因（可留空）：');
            const res = await callAPI('rejectUser', { userEmail: state.userEmail, targetEmail: email, reason });
            showToast(res.message, res.success ? 'success' : 'error');
            if (res.success) switchAdminTab('tab-pending');
        }
        async function addStorageFolder() {
            const folderId = document.getElementById('new-folder-id').value.trim();
            const folderName = document.getElementById('new-folder-name').value.trim();
            if (!folderId) { showToast('請輸入資料夾 ID','error'); return; }
            const res = await callAPI('addStorageFolder', { userEmail: state.userEmail, folderId, folderName });
            showToast(res.message, res.success ? 'success' : 'error');
            if (res.success) switchAdminTab('tab-storage');
        }

        function handleLogout() {
            state.userEmail = '';
            state.role = '';
            location.reload();
        }
        function goHome() {
            document.getElementById('videos-page').classList.remove('hidden');
            document.getElementById('login-page').classList.add('hidden');
            loadVideos();
        }
    </script>
</body>
</html>
